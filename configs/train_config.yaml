# ============================================================
# Configuration file for training kidney cancer detection model
# ============================================================

# ---------- Data settings ----------
data:
  # Paths to preprocessed numpy arrays (generated by generate_slices.py)
  slices_path: "data/processed/all_slices.npy"      # shape (N, 128, 128)
  labels_path: "data/processed/all_labels.npy"      # shape (N,)
  patient_ids_path: "data/processed/patient_ids.npy" # optional, for patient-wise CV
  
  # For Moroccan clinical data (prospective validation)
  clinical_data_path: "data/moroccan/processed/"
  
  # Train/validation/test split ratios (if not using cross-validation)
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  
  # Class names
  class_names: ["normal", "tumor"]

# ---------- Model architecture ----------
model:
  name: "ResNet18"
  pretrained: true                   # use ImageNet pretrained weights
  num_classes: 2
  dropout_rate: 0.2                  # dropout before final FC
  # Modify first conv for single channel (CT grayscale)
  in_channels: 1

# ---------- Training hyperparameters ----------
training:
  # Basic
  batch_size: 32
  epochs: 30
  seed: 42
  num_workers: 4                     # for DataLoader
  pin_memory: true
  device: "auto"                     # auto, cuda, cpu
  
  # Optimization
  optimizer: "AdamW"
  lr: 0.0001
  weight_decay: 0.00001
  momentum: 0.9                      # for SGD only
  
  # Learning rate scheduler
  scheduler:
    type: "ReduceLROnPlateau"
    factor: 0.5
    patience: 3
    min_lr: 1e-7
    verbose: true
  
  # Loss function
  loss:
    type: "CrossEntropyLoss"
    class_weights: null               # e.g., [0.3, 0.7] to balance classes
    label_smoothing: 0.0
  
  # Regularization
  use_mixed_precision: true           # automatic mixed precision (AMP)
  gradient_clip_norm: 1.0
  
  # Early stopping
  early_stop_patience: 5
  early_stop_metric: "val_acc"        # monitor this metric
  
  # Cross-validation
  n_folds: 5
  patient_wise_cv: true               # use GroupKFold based on patient_ids
  
  # Data augmentation (applied on-the-fly during training)
  augmentation:
    random_rotation: 15               # degrees
    random_translation: 0.1           # fraction of image size
    random_scaling: [0.9, 1.1]
    random_flip: true
    random_brightness: 0.1
    random_contrast: 0.1
  
  # Normalization (applied after augmentation)
  normalization:
    mean: 0.5
    std: 0.5

# ---------- Evaluation metrics ----------
evaluation:
  metrics:
    - "accuracy"
    - "precision"
    - "recall"
    - "f1_score"
    - "roc_auc"
    - "confusion_matrix"
  thresholds: [0.5]                   # for binary classification
  
  # For prospective validation
  prospective_batch_size: 16

# ---------- Logging and checkpoints ----------
paths:
  checkpoint_dir: "results/checkpoints"
  log_dir: "results/logs"
  tensorboard_dir: "results/tensorboard"
  best_model_filename: "best_model_fold{fold}.pth"
  final_model_filename: "final_model.pth"

logging:
  level: "INFO"                       # DEBUG, INFO, WARNING, ERROR
  save_model_checkpoints: true
  save_frequency_epochs: 5
  print_frequency_batches: 50

# ---------- Reproducibility ----------
reproducibility:
  deterministic: true
  cudnn_benchmark: false
  cudnn_deterministic: true

# ---------- Deployment (optional) ----------
deployment:
  onnx_export: false
  onnx_opset_version: 11
  torchscript: false
